<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <script>
      (function () {
        var ua = navigator.userAgent || "";
        var isInApp =
          /Instagram|FBAN|FBAV|FB_IAB|IABMV\/1|Twitter|Line\/|TikTok|Snapchat|Pinterest/i.test(
            ua,
          );

        if (isInApp) {
          document.documentElement.classList.add("in-app-browser");

          var viewportMeta = document.querySelector('meta[name="viewport"]');
          if (viewportMeta) {
            viewportMeta.setAttribute(
              "content",
              "width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content",
            );
          }
        }

        function readViewportWidth() {
          return window.visualViewport
            ? window.visualViewport.width
            : window.innerWidth;
        }

        function readViewportHeight() {
          return window.visualViewport
            ? window.visualViewport.height
            : window.innerHeight;
        }

        function shouldForceMobile() {
          if (isInApp) {
            return true;
          }

          var layoutWidth = window.innerWidth;
          var visualWidth = readViewportWidth();
          var coarsePointer = window.matchMedia("(pointer: coarse)").matches;

          return coarsePointer && layoutWidth > visualWidth + 1;
        }

        if (shouldForceMobile()) {
          document.documentElement.setAttribute("data-force-mobile", "true");
        }

        function syncViewportMetrics() {
          var height = readViewportHeight();
          document.documentElement.style.setProperty(
            "--app-vh",
            height * 0.01 + "px",
          );
        }

        syncViewportMetrics();
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", syncViewportMetrics);
          window.visualViewport.addEventListener("scroll", syncViewportMetrics);
        }
        window.addEventListener("resize", syncViewportMetrics);
        window.addEventListener("orientationchange", syncViewportMetrics);
      })();
    </script>
    <meta
      name="description"
      content="Ninety Two E-Sports — organización de simracing. Equipos, noticias, torneos y patrocinadores."
    />
    <meta name="theme-color" content="#000000" />
    <title>Ninety Two E-Sports</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/icons/favicon-32x32.png?v=__APP_VERSION__"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/icons/favicon-16x16.png?v=__APP_VERSION__"
    />
    <link rel="shortcut icon" href="/favicon.png?v=__APP_VERSION__" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png?v=__APP_VERSION__"
    />
    <link rel="manifest" href="/site.webmanifest?v=__APP_VERSION__" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
